<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<body>
    <h1 style="color: orange;">HOW CAN WE HELP YOU?</H1>
    <fieldset>
        <legend style="color: blue;"><h3>REQUEST FOR PROPOSAL</h3></legend>

        <table>
    <tr>
        <td><label >Your Name: </label></td>
        <td><input type="text"></td>
        
    </tr>
    <tr>
        <td><label>Email: </label></td>
        <td><input type="text" ></td>
    </tr>
    <tr>
        <td><label>Username: </label> </td>
        <td><input type="text"></td>
    </tr>
   
    <tr>
        <td>Password: </td>
        <td><input type="password"></td>
    </tr>

    <tr>
        <td>Your Business: </td>
        <td><textarea name="describe your business in this space" rows="5"></textarea></td>
    </tr>

    <tr>
        <td style="vertical-align: text-top;">Company Size: </td>
        <td><input type="radio" name="company size"><label>less than 10</label>
          <br><input type="radio" name="company size"><label>11 to 50</label>
          <br><input type="radio" name="company size"><label>less than 10</label>
          <br><input type="radio" name="company size"><label>over 200</label></td>
    </tr>

    <tr>
        <td>Service: </td>
        <td> <input type="checkbox" class="inline"> Brand Identity
        <input type="checkbox" class="inline"> New Website
        <input type="checkbox" class="inline"> Web Redesign</td>
    </tr>

    <tr>
        <td>Timeline: </td>
        <td><select>
            <option>Immediately</option>
            <option>1-2 weeks</option>
            <option>3-6 weeks</option>
            <option>7-2 months</option>
        </select></td>
    </tr>

    

    <tr>
        <td><input type="submit" value="Send to devdesign"></td>
    </tr>

   </table> 
   </fieldset>
</body>
</html>
